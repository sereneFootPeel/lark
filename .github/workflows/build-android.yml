name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      # 1. 设置 GraalVM (注意：Gluon 有时更喜欢它自己的 GraalVM，但通常这个可以工作)
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      # 2. 显式设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 3. 必须：手动下载 Gluon 专用的 GraalVM (因为 compile 失败通常是由于标准版 GraalVM 不支持 Android 交叉编译)
      # 插件 1.0.28 虽然删了 install-graalvm 目标，但它提供了一个自动下载机制
      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      # 4. 关键修改：增加环境变量并使用 gluonfx:compile
      # 我们手动指定路径，确保插件能找到 Android SDK
      - name: Build with GluonFX
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: |
          # 如果之前报错，尝试先 clean
          ./mvnw clean gluonfx:build gluonfx:package -Pandroid -Dgluonfx.target=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: target/gluonfx/aarch64-android/gvm/*.apk
