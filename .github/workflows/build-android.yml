name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm-community'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      - name: Build APK
        run: ./mvnw gluonfx:build gluonfx:package -Pandroid -DgraalvmHome=$JAVA_HOME

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lark-apk
          path: target/gluonfx/aarch64-android/gvm/lark.apk
