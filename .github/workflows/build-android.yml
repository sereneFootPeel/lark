      - name: Debug GraalVM env
        run: |
          echo "GRAALVM_HOME=$GRAALVM_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -l $GRAALVM_HOME || true
          ls -l $JAVA_HOME || true
          ls -l ./graalvm-ce-java18-22.3.2 || true
          env | grep GRAAL
          env | grep JAVA
name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Set up JDK 18
        uses: actions/setup-java@v4.2.1
        with:
          distribution: 'temurin'
          java-version: '18'

      - name: Set up GraalVM
        run: |
          wget https://github.com/graalvm/graalvm-ce-builds/releases/download/vm-22.3.2/graalvm-ce-java18-linux-amd64-22.3.2.tar.gz
          tar -xzf graalvm-ce-java18-linux-amd64-22.3.2.tar.gz
          GVM_DIR="$PWD/graalvm-ce-java18-22.3.2"
          echo "GRAALVM_HOME=$GVM_DIR" >> $GITHUB_ENV
          echo "$GVM_DIR/bin" >> $GITHUB_PATH
          # set JAVA_HOME to GraalVM for the rest of the job and install native-image
          echo "JAVA_HOME=$GVM_DIR" >> $GITHUB_ENV
          export PATH="$GVM_DIR/bin:$PATH"
          gu --version || true
          gu install native-image || true

      - name: Install Gluon Client plugin
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          wget https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_linux-x64_bin-sdk.zip
          unzip openjfx-21.0.2_linux-x64_bin-sdk.zip -d $HOME/javafx-sdk

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      - name: Build APK
        run: |
          export GRAALVM_HOME=$PWD/graalvm-ce-java18-22.3.2
          export JAVA_HOME=$PWD/graalvm-ce-java18-22.3.2
          ./mvnw gluonfx:build gluonfx:package -Pandroid

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lark-apk
          path: target/gluonfx/aarch64-android/gvm/lark.apk

