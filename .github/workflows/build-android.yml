name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 18
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '18'

      - name: Install Gluon Client plugin
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          wget https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_linux-x64_bin-sdk.zip
          unzip openjfx-21.0.2_linux-x64_bin-sdk.zip -d $HOME/javafx-sdk

      - name: Build APK
        run: |
          ./mvnw gluonfx:build gluonfx:package -Pandroid

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lark-apk
          path: target/gluonfx/aarch64-android/gvm/lark.apk

