name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      # 1. 换成普通的 JDK 17，不要用 setup-graalvm
      - name: Set up JDK 17
        uses: actions/setup-java@v4.2.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      # 2. 关键修改：让插件自己去下载 Gluon 专用的 GraalVM
      - name: Build APK
        run: |
          ./mvnw gluonfx:install-graalvm    # 强制下载 Gluon 专用版
          ./mvnw gluonfx:build gluonfx:package -Pandroid
